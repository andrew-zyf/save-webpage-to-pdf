<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --ink: #141414;
      --muted: #66615a;
      --rule: #d8d1c3;
      --paper: #f7f5ef;
      --accent: #1a73e8;
      --accent-hover: #1557b0;
    }
    * { box-sizing: border-box; }
    body {
      width: 280px; margin: 0; padding: 18px 20px 14px;
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--ink); background: #fff;
    }
    .header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .header img {
      width: 32px; height: 32px; border-radius: 7px; flex-shrink: 0;
    }
    .header h1 {
      font-size: 14px; font-weight: 700; margin: 0; line-height: 1.25;
      color: var(--ink); letter-spacing: -0.01em;
    }
    .header .sub {
      font-size: 11px; color: var(--muted); font-weight: 400; margin: 1px 0 0;
    }
    button {
      width: 100%; padding: 10px 0; border: 0; border-radius: 8px;
      color: #fff; font-size: 13.5px; font-weight: 600; cursor: pointer;
      background: var(--accent);
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { background: #aaa !important; cursor: default; }
    button .icon { font-size: 16px; vertical-align: -1px; }
    .repo {
      display: flex; align-items: center; gap: 5px;
      margin-top: 10px; font-size: 11px; color: var(--muted);
    }
    .repo a {
      color: var(--muted); text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .repo a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="" width="32" height="32">
    <div>
      <h1>Save WSJ Webpage to PDF</h1>
      <div class="sub">WSJ 文章 → 竖向 A4 PDF</div>
    </div>
  </div>
  <button id="pdf"><span class="icon">⎙</span> 保存当前页面</button>
  <div class="repo">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38v-1.33c-2.23.48-2.69-1.07-2.69-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.06-.49.06-.49.8.06 1.23.82 1.23.82.71 1.22 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.19c0 .21.15.46.55.38A8.01 8.01 0 0 0 8 0Z"/>
    </svg>
    <a href="https://github.com/andrew-zyf/save-webpage-to-pdf" target="_blank">GitHub</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
